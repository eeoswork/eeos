<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EEOS</title>
  <!-- Default for browsers that do NOT support prefers-color-scheme -->
  <link rel="icon" href="/eeos-logo-svg-default.svg" type="image/svg+xml">
  <link rel="icon" href="/eeos-logo-png-default.png" type="image/png">

  <!-- Light mode -->
  <link rel="icon" href="/eeos-logo-svg-black.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
  <link rel="icon" href="/eeos-logo-png-black.png" type="image/png" media="(prefers-color-scheme: light)">

  <!-- Dark mode -->
  <link rel="icon" href="/eeos-logo-svg-white.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/eeos-logo-png-white.png" type="image/png" media="(prefers-color-scheme: dark)">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto max-w-3xl px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="h-8 w-8 rounded-lg bg-slate-900"></div>
        <div class="font-semibold tracking-tight">EEOS</div>
      </div>
      <div class="text-sm text-slate-500">RSVP</div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-4 py-8">
    <div id="banner" class="hidden mb-4 rounded-xl border border-slate-200 bg-white px-4 py-3">
      <div class="flex items-start justify-between gap-4">
        <div>
          <div id="bannerTitle" class="text-sm font-semibold text-slate-900">Loading…</div>
          <div id="bannerBody" class="text-sm text-slate-600">Please wait.</div>
        </div>
        <button id="bannerClose" class="hidden text-sm font-medium text-slate-600 hover:text-slate-900">Close</button>
      </div>
    </div>

    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm">
      <div class="px-6 py-6 border-b border-slate-200">
        <h1 id="title" class="text-2xl font-semibold tracking-tight">Confirm your spot</h1>
        <p id="eventLine" class="mt-2 text-slate-700">Loading event details…</p>
        <p id="summaryLine" class="mt-1 text-sm text-slate-600"></p>
        <p id="socialProof" class="mt-2 text-sm text-slate-600"></p>
        <p id="deadlinePill" class="mt-2 hidden"></p>
        <p id="deadlineLine" class="mt-1 text-sm text-slate-600"></p>
      </div>

      <div class="px-6 py-6 space-y-4">
        <details id="yesFields" class="hidden rounded-xl border border-slate-200 bg-slate-50 px-4 py-3" open>
          <summary class="cursor-pointer text-sm font-medium text-slate-700">Add name/email (optional)</summary>
          <div class="mt-3 grid gap-3 sm:grid-cols-2">
            <label class="block">
              <span class="text-xs font-medium text-slate-600">Name</span>
              <input id="name" type="text" class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" placeholder="Your name" />
            </label>
            <label class="block">
              <span class="text-xs font-medium text-slate-600">Email</span>
              <input id="email" type="email" class="mt-1 w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm text-slate-900" placeholder="name@company.com" />
            </label>
          </div>
        </details>

        <div class="grid gap-3 sm:grid-cols-2">
          <button id="yesBtn" class="inline-flex min-h-[54px] items-center justify-center rounded-xl bg-slate-900 px-5 py-3 text-base font-semibold text-white hover:bg-slate-800 disabled:cursor-not-allowed disabled:bg-slate-300">Yes, I’m in</button>
          <button id="noBtn" class="inline-flex min-h-[54px] items-center justify-center rounded-xl border border-slate-300 bg-white px-5 py-3 text-base font-semibold text-slate-800 hover:bg-slate-50 disabled:cursor-not-allowed disabled:bg-slate-100">No, can’t make it</button>
        </div>

        <button id="submit" type="button" class="inline-flex min-h-[46px] items-center justify-center rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800 disabled:cursor-not-allowed disabled:bg-slate-300">Confirm RSVP</button>

        <div id="resultsLine" class="hidden rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700"></div>
      </div>
    </section>

    <div class="mt-6 text-center text-xs text-slate-500">Powered by EEOS</div>
  </main>

  <script>
    const API_BASE = "https://esos-polls.ajolly2.workers.dev/api";

    const els = {
      banner: document.getElementById("banner"),
      bannerTitle: document.getElementById("bannerTitle"),
      bannerBody: document.getElementById("bannerBody"),
      bannerClose: document.getElementById("bannerClose"),
      title: document.getElementById("title"),
      eventLine: document.getElementById("eventLine"),
      summaryLine: document.getElementById("summaryLine"),
      socialProof: document.getElementById("socialProof"),
      deadlinePill: document.getElementById("deadlinePill"),
      deadlineLine: document.getElementById("deadlineLine"),
      yesFields: document.getElementById("yesFields"),
      name: document.getElementById("name"),
      email: document.getElementById("email"),
      yesBtn: document.getElementById("yesBtn"),
      noBtn: document.getElementById("noBtn"),
      submit: document.getElementById("submit"),
      resultsLine: document.getElementById("resultsLine")
    };

    const params = new URLSearchParams(location.search);
    const rsvpId = String(params.get("rsvpId") || "").trim();
    let submitted = false;
    let selectedAnswer = "";
    let submitBusy = false;

    function normalizeErrorMessage(error, fallback = "") {
      const text = String(error?.message || error || "").trim();
      return text || fallback;
    }

    window.addEventListener("error", (event) => {
      showBanner("Something went wrong", normalizeErrorMessage(event?.error || event?.message, "Unexpected error."), true);
    });

    window.addEventListener("unhandledrejection", (event) => {
      showBanner("Something went wrong", normalizeErrorMessage(event?.reason, "Unexpected async error."), true);
    });

    function showBanner(title, body, closable = false) {
      els.bannerTitle.textContent = title || "";
      els.bannerBody.textContent = body || "";
      els.banner.classList.remove("hidden");
      els.bannerClose.classList.toggle("hidden", !closable);
    }

    function hideBanner() {
      els.banner.classList.add("hidden");
    }

    function setButtonsDisabled(disabled) {
      els.yesBtn.disabled = disabled;
      els.noBtn.disabled = disabled;
      if (els.submit) els.submit.disabled = disabled;
      els.name.disabled = disabled;
      els.email.disabled = disabled;
    }

    function safeJson(response) {
      return response.json().catch(() => null);
    }

    function formatDeadline(iso) {
      if (!iso) return "";
      const parsed = new Date(iso);
      if (Number.isNaN(parsed.getTime())) return "";
      return parsed.toLocaleString(undefined, {
        weekday: "short",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function isValidEmail(value) {
      const trimmed = String(value || "").trim();
      const atIndex = trimmed.indexOf("@");
      if (atIndex <= 0) return false;
      const dotIndex = trimmed.indexOf(".", atIndex + 2);
      return dotIndex > atIndex + 1 && dotIndex < trimmed.length - 1;
    }

    function updateSubmitEnabled() {
      if (!els.submit) return;
      if (submitted || submitBusy) {
        els.submit.disabled = true;
        return;
      }
      if (!selectedAnswer) {
        els.submit.disabled = true;
        return;
      }
      if (selectedAnswer === "no") {
        els.submit.disabled = true;
        return;
      }
      const validName = String(els.name.value || "").trim().length > 0;
      const validEmail = isValidEmail(els.email.value);
      els.submit.disabled = !(validName && validEmail);
    }

    function renderRsvp(rsvp, results) {
      const eventName = String(rsvp?.eventName || "Team event").trim() || "Team event";
      const eventDate = String(rsvp?.eventDate || "Date TBD").trim() || "Date TBD";
      const eventTime = String(rsvp?.eventTime || "Time TBD").trim() || "Time TBD";
      const locationLabel = String(rsvp?.locationLabel || "").trim();
      const eventDescription = String(rsvp?.eventDescription || "").trim();
      const deadlineText = formatDeadline(String(rsvp?.deadlineIso || "").trim());

      els.title.textContent = `Confirm your spot — ${eventName}`;
      els.eventLine.textContent = `${eventDate} at ${eventTime}`;
      els.summaryLine.textContent = [locationLabel, eventDescription].filter(Boolean).join(" · ");
      els.deadlineLine.textContent = deadlineText ? `RSVP by ${deadlineText}` : "";
      if (deadlineText) {
        els.deadlinePill.classList.remove("hidden");
        els.deadlinePill.innerHTML = `<span class="inline-flex items-center rounded-full border border-slate-200 bg-slate-50 px-2.5 py-1 text-xs font-medium text-slate-700">Closes ${deadlineText}</span>`;
      } else {
        els.deadlinePill.classList.add("hidden");
        els.deadlinePill.textContent = "";
      }

      const total = Number(results?.totalResponses || 0);
      const yes = Number(results?.yesCount || 0);
      const no = Number(results?.noCount || 0);
      els.resultsLine.textContent = `Current responses: ${total} total · ${yes} yes · ${no} no`;
      els.resultsLine.classList.remove("hidden");
      els.socialProof.textContent = total > 0
        ? `${total} coworkers have responded so far`
        : "Be the first to respond";
    }

    async function parseApiResponse(response) {
      const contentType = String(response.headers.get("content-type") || "").toLowerCase();
      if (contentType.includes("application/json")) {
        const data = await safeJson(response);
        return { data, textSnippet: "" };
      }
      const text = await response.text().catch(() => "");
      return {
        data: null,
        textSnippet: String(text || "").slice(0, 180)
      };
    }

    function mapApiError(data, status, textSnippet = "") {
      const code = String(data?.error || "").trim();
      if (code === "already_responded") return "We already received your RSVP from this browser.";
      if (code === "rsvp_closed" || code === "poll_closed") return "RSVPs are closed for this event.";
      if (code === "rsvp_not_found") return "This RSVP link is invalid or expired.";
      if (!data && textSnippet) return `Request failed (${status}): ${textSnippet}`;
      return String(data?.error || data?.message || `Request failed (${status}).`).trim();
    }

    async function loadRsvp() {
      if (!rsvpId) {
        showBanner("Link error", "Missing rsvpId in URL. Please use the full RSVP link.", true);
        els.eventLine.textContent = "This RSVP link is incomplete.";
        setButtonsDisabled(true);
        return;
      }

      showBanner("Loading RSVP…", "Just a moment.");
      try {
        const response = await fetch(`${API_BASE}/rsvps/${encodeURIComponent(rsvpId)}`, {
          method: "GET",
          headers: { Accept: "application/json" }
        });
        const { data, textSnippet } = await parseApiResponse(response);

        if (!response.ok || !data) {
          const mapped = mapApiError(data, response.status, textSnippet);
          showBanner("RSVP not found", mapped || "This RSVP link is invalid or expired.", true);
          els.eventLine.textContent = "This RSVP link may be incorrect or expired.";
          setButtonsDisabled(true);
          return;
        }

        const root = (data?.data && typeof data.data === "object") ? data.data : data;
        const rsvp = (root?.rsvp && typeof root.rsvp === "object") ? root.rsvp : {};
        const results = (root?.results && typeof root.results === "object") ? root.results : {};

        renderRsvp(rsvp, results);
        hideBanner();
        updateSubmitEnabled();
      } catch (_error) {
        showBanner("Couldn’t load RSVP", "Network error while loading RSVP. Please refresh and try again.", true);
        setButtonsDisabled(true);
      }
    }

    async function submitRsvp() {
      if (submitted || submitBusy) return;
      if (!rsvpId) return;
      if (!selectedAnswer) {
        showBanner("Choose an option", "Please choose Yes or No.", true);
        updateSubmitEnabled();
        return;
      }

      const payload = { answer: selectedAnswer };
      if (selectedAnswer === "yes") {
        const name = String(els.name.value || "").trim();
        const email = String(els.email.value || "").trim();
        if (!name) {
          showBanner("Missing name", "Please enter your name.", true);
          updateSubmitEnabled();
          return;
        }
        if (!isValidEmail(email)) {
          showBanner("Invalid email", "Please enter a valid email address.", true);
          updateSubmitEnabled();
          return;
        }
        payload.name = name;
        payload.email = email;
      }

      submitBusy = true;
      setButtonsDisabled(true);
      showBanner("Submitting…", "Please wait.");

      try {
        const response = await fetch(`${API_BASE}/rsvps/${encodeURIComponent(rsvpId)}/respond`, {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify(payload)
        });
        const { data, textSnippet } = await parseApiResponse(response);

        if (response.ok && data?.ok) {
          submitted = true;
          showBanner("Response saved", "Response saved — thank you.", true);
          setButtonsDisabled(true);
          return;
        }

        const mappedError = mapApiError(data, response.status, textSnippet);
        if (String(data?.error || "") === "already_responded") {
          submitted = true;
          showBanner("Already responded", mappedError, true);
          setButtonsDisabled(true);
          return;
        }
        if (String(data?.error || "") === "rsvp_closed" || String(data?.error || "") === "poll_closed") {
          submitted = true;
          showBanner("RSVP closed", mappedError, true);
          setButtonsDisabled(true);
          return;
        }
        if (String(data?.error || "") === "rsvp_not_found") {
          showBanner("Invalid link", mappedError, true);
          setButtonsDisabled(true);
          return;
        }

        showBanner("Couldn’t submit", mappedError || "Couldn’t submit. Please try again.", true);
        submitBusy = false;
        setButtonsDisabled(false);
        updateSubmitEnabled();
      } catch (_error) {
        showBanner("Couldn’t submit", "Couldn’t submit. Please try again.", true);
        submitBusy = false;
        setButtonsDisabled(false);
        updateSubmitEnabled();
      }
    }

    els.bannerClose.onclick = () => hideBanner();
    els.yesBtn.onclick = () => {
      if (submitted || submitBusy) return;
      selectedAnswer = "yes";
      els.yesFields.classList.remove("hidden");
      updateSubmitEnabled();
    };
    els.noBtn.onclick = async () => {
      if (submitted || submitBusy) return;
      selectedAnswer = "no";
      els.yesFields.classList.add("hidden");
      updateSubmitEnabled();
      await submitRsvp();
    };

    els.name.addEventListener("input", updateSubmitEnabled);
    els.email.addEventListener("input", updateSubmitEnabled);
    if (els.submit) {
      els.submit.addEventListener("click", submitRsvp);
      els.submit.onclick = submitRsvp;
    }

    loadRsvp();
  </script>
</body>
</html>
