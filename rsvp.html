<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>EEOS RSVP</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
html,body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;}
</style>
</head>

<body class="min-h-screen bg-slate-50 text-slate-900">

<header class="border-b border-slate-200 bg-white">
<div class="mx-auto max-w-3xl px-4 py-4 flex items-center justify-between">

<div class="flex items-center gap-2">
<div class="h-8 w-8 rounded-lg bg-slate-900"></div>
<div class="font-semibold tracking-tight">EEOS</div>
</div>

<div class="text-sm text-slate-500">RSVP</div>

</div>
</header>


<main class="mx-auto max-w-3xl px-4 py-8">

<section class="rounded-2xl border border-slate-200 bg-white shadow-sm">

<div class="px-6 py-6 border-b border-slate-200">

<h1 id="title" class="text-2xl font-semibold tracking-tight">
Loading RSVP…
</h1>

<p id="intro" class="mt-2 text-slate-600">
Please wait.
</p>

</div>


<div class="px-6 py-6 space-y-6">

<div class="rounded-xl border border-slate-200 bg-slate-50 p-4">

<div class="text-xs font-semibold uppercase text-slate-500">
Event
</div>

<div id="eventName" class="mt-1 text-sm font-semibold">
—
</div>

<div id="whenText" class="mt-2 text-sm text-slate-600">
—
</div>

<div id="locationLabel" class="mt-1 text-sm text-slate-600"></div>

</div>


<div>

<h2 class="text-base font-semibold">
Will you attend?
</h2>

</div>


<div class="flex flex-col sm:flex-row gap-3">

<button
id="btnYes"
class="w-full rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">

Yes, I'm in

</button>


<button
id="btnNo"
class="w-full rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-900 hover:bg-slate-50">

No, can't make it

</button>

</div>


<!-- NAME + EMAIL (hidden until YES clicked) -->

<div id="yesForm" class="hidden space-y-3">

<div class="text-sm text-slate-600">
Great! Please enter your name so we can add you to the attendee list.
</div>

<input
id="nameInput"
placeholder="Your name"
class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
/>

<input
id="emailInput"
placeholder="Your email"
class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
/>

<button
id="confirmYes"
class="w-full rounded-xl bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800">

Confirm RSVP

</button>

</div>


<div id="smallStatus" class="text-sm text-slate-500">
One click — you're done.
</div>

</div>
</section>


<div class="mt-6 text-center text-xs text-slate-500">
Powered by EEOS
</div>

</main>


<script>

const API_BASE="https://esos-polls.ajolly2.workers.dev/api";

const params=new URLSearchParams(location.search);

const rsvpId=params.get("rsvpId");

let rsvp=null;


async function safeJson(r){

try{return await r.json()}

catch{return null}

}


async function loadRsvp(){

const res=await fetch(`${API_BASE}/rsvps/${encodeURIComponent(rsvpId)}`);

const data=await safeJson(res);

if(!data||!data.ok){

document.getElementById("title").textContent="RSVP not found";

return;

}

rsvp=data.rsvp;

document.getElementById("title").textContent="RSVP";

document.getElementById("intro").textContent="Please confirm if you can attend.";

document.getElementById("eventName").textContent=rsvp.eventName;

document.getElementById("whenText").textContent=`${rsvp.eventDate} @ ${rsvp.eventTime}`;

if(rsvp.locationLabel){

document.getElementById("locationLabel").textContent=rsvp.locationLabel;

}

}


async function submit(answer,name,email){

const payload={answer};

if(name)payload.name=name;

if(email)payload.email=email;

const res=await fetch(`${API_BASE}/rsvps/${encodeURIComponent(rsvpId)}/respond`,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify(payload)

});

const data=await safeJson(res);

if(data&&data.ok){

document.getElementById("smallStatus").textContent="Thanks — your RSVP is saved.";

document.getElementById("btnYes").disabled=true;

document.getElementById("btnNo").disabled=true;

document.getElementById("yesForm").classList.add("hidden");

}

}


document.getElementById("btnYes").onclick=()=>{

document.getElementById("yesForm").classList.remove("hidden");

document.getElementById("smallStatus").textContent="Just your name and email.";

};


document.getElementById("confirmYes").onclick=()=>{

const name=document.getElementById("nameInput").value.trim();

const email=document.getElementById("emailInput").value.trim();

submit("yes",name,email);

};


document.getElementById("btnNo").onclick=()=>submit("no");


loadRsvp();

</script>

</body>
</html>
